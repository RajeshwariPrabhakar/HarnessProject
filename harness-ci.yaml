pipeline:
  name: Java-CI
  identifier: Java_CI
  projectIdentifier: default_project
  orgIdentifier: default

  properties:
    ci:
      codebase:
        connectorRef: GitHubConnector
        repoName: HarnessProject
        build:
          type: branch
          spec:
            branch: main

  stages:
    - stage:
        name: Build
        identifier: Build
        type: CI

        spec:
          cloneCodebase: true

          infrastructure:
            type: Hosted
            spec:
              platform: Linux
              arch: Amd64

          execution:
            steps:
              - step:
                  type: Run
                  name: Maven_Build
                  identifier: Maven_Build

                  spec:
                    shell: Sh
                    image: maven:3.9.6-eclipse-temurin-17

                    command: |
                      mvn clean package
